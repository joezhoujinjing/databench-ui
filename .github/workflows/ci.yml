name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: schema-drift + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The generated client is build output: regenerate it from the pinned
      # schema/openapi.json and fail if it differs from what's committed. This is
      # the frontend half of the cross-repo schema-drift contract gate.
      - name: Check generated client is in sync with pinned schema
        run: npm run gen:client:check

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
