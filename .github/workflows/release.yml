name: Release

# Triggered by a v* tag (pushed by auto-tag-release.yml on a version bump) or
# manually. Builds the SPA, mirrors dist/ to the Aliyun OSS static-website
# bucket, refreshes the CDN so users get the new index.html immediately, then
# cuts a GitHub Release.
#
# Required secrets: OSS_ACCESS_KEY_ID, OSS_ACCESS_KEY_SECRET.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build + publish to OSS + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Install Aliyun CLI
        run: |
          URL=$(curl -fsSL https://api.github.com/repos/aliyun/aliyun-cli/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux.*amd64\\.tgz$")) | .browser_download_url' \
            | head -1)
          echo "Downloading $URL"
          curl -fsSL -o aliyun-cli.tgz "$URL"
          tar -xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/aliyun
          aliyun version

      - name: Configure Aliyun CLI
        run: |
          aliyun configure set --profile ci --mode AK --region cn-hongkong \
            --access-key-id "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.OSS_ACCESS_KEY_SECRET }}"

      - name: Upload dist/ to OSS
        run: |
          # Mirror the build output and prune objects that no longer exist.
          aliyun oss sync dist/ oss://databench-ui/ \
            --endpoint oss-cn-hongkong.aliyuncs.com --delete -f --profile ci
          # The SPA entrypoint must never be edge/browser cached, or users keep
          # getting the old asset hashes. Hashed assets under assets/ are
          # immutable and stay long-cached.
          aliyun oss set-meta oss://databench-ui/index.html Cache-Control:no-cache \
            --endpoint oss-cn-hongkong.aliyuncs.com -f --profile ci

      - name: Refresh CDN
        run: |
          aliyun cdn RefreshObjectCaches \
            --ObjectPath "https://databench.jinjing.me/" --ObjectType Directory --profile ci
          aliyun cdn RefreshObjectCaches \
            --ObjectPath "https://databench.jinjing.me/index.html" --ObjectType File --profile ci

      - name: Extract changelog section
        id: changelog
        run: |
          # Pull the latest section: from the first "## [" header up to (but not
          # including) the second. Empty if CHANGELOG.md has no such section.
          awk '/^## \[/{c++; if(c==2) exit} c>=1' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ -s RELEASE_NOTES.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.have_notes == 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.have_notes != 'true' }}
